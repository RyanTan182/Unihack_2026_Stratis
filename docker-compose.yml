services:
  mirofish:
    build:
      context: ./mirofish
    ports:
      - "5001:5001"
      - "5002:3000"
    environment:
      - LLM_API_KEY=${OPENROUTER_API_KEY}
      - LLM_BASE_URL=https://openrouter.ai/api/v1
      - LLM_MODEL_NAME=moonshotai/kimi-k2.5
      - ZEP_API_KEY=${ZEP_API_KEY}
    volumes:
      - mirofish-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mirofish-data:
